<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DeutschFlow – German A1 Learning App</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0e0720;color:#fff;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:420px;min-height:100vh;position:relative;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom)}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
.home-header{background:linear-gradient(160deg,#1a0533 0%,#2d1060 50%,#180a3d 100%);padding:2rem 1.25rem 2.5rem;position:relative;overflow:hidden}
.home-header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(160,100,255,0.15)}
.home-header::after{content:'';position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(100,180,255,0.1)}
.app-brand{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.brand-icon{width:38px;height:38px;border-radius:10px;background:rgba(160,100,255,0.3);border:1px solid rgba(160,100,255,0.5);display:flex;align-items:center;justify-content:center;font-size:18px}
.brand-name{font-size:17px;font-weight:500;color:#e8d8ff;letter-spacing:.5px}
.home-title{font-size:26px;font-weight:600;color:#fff;margin-bottom:6px;line-height:1.3}
.home-sub{font-size:13px;color:rgba(200,170,255,0.8)}
.progress-ring{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.07);border-radius:14px;padding:12px 14px;margin-top:1.25rem;border:.5px solid rgba(160,100,255,0.3)}
.ring-stat{text-align:center;flex:1}
.ring-num{font-size:20px;font-weight:600;color:#c8a0ff}
.ring-label{font-size:11px;color:rgba(180,150,220,0.7)}
.ring-divider{width:.5px;height:36px;background:rgba(160,100,255,0.3)}
.subjects-section{padding:1.25rem;flex:1;background:#0e0720;padding-bottom:2rem}
.section-label{font-size:12px;color:rgba(200,170,255,0.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:.75rem}
.subject-grid{display:flex;flex-direction:column;gap:10px}
.subject-card{background:#1a1030;border:1px solid rgba(160,100,255,0.18);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.subject-card:hover{border-color:rgba(160,100,255,0.4);background:#201540}
.subject-card:active{transform:scale(0.98)}
.subject-card.locked{opacity:.4;cursor:default}
.subject-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.subject-info{flex:1;min-width:0}
.subject-name{font-size:14px;font-weight:500;color:#e8d8ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subject-meta{font-size:12px;color:rgba(200,170,255,0.5);margin-top:2px}
.subject-progress-bar{height:3px;background:rgba(160,100,255,0.15);border-radius:2px;margin-top:6px;overflow:hidden}
.subject-progress-fill{height:100%;border-radius:2px;transition:width .5s}
.subject-chevron{color:rgba(200,170,255,0.4);font-size:15px}
.subject-header{background:linear-gradient(160deg,#1a0533 0%,#2d1060 100%);padding:1.25rem}
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:0 0 1rem 0}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:rgba(200,170,255,0.9);cursor:pointer;background:rgba(255,255,255,0.09);border:1px solid rgba(160,100,255,0.3);border-radius:20px;padding:8px 14px 8px 10px;transition:all .2s;font-family:inherit}
.back-btn:hover{background:rgba(255,255,255,0.14)}
.back-btn:active{background:rgba(255,255,255,0.18)}
.home-nav-btn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:rgba(255,255,255,0.09);border:1px solid rgba(160,100,255,0.3);border-radius:50%;color:rgba(200,170,255,0.9);font-size:15px;cursor:pointer;transition:all .2s}
.home-nav-btn:hover{background:rgba(255,255,255,0.16)}
.home-nav-btn:active{background:rgba(255,255,255,0.2)}
.subj-hero{display:flex;align-items:center;gap:14px}
.subj-big-icon{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.subj-title{font-size:20px;font-weight:600;color:#fff}
.subj-desc{font-size:13px;color:rgba(200,170,255,0.7);margin-top:3px}
.levels-container{padding:1rem 1.25rem 2rem;flex:1;background:#0e0720;overflow-y:auto}
.level-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.level-node{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:all .2s}
.level-node.done{background:#2d1060;border-color:#7a40c8;color:#d4a8ff}
.level-node.current{background:linear-gradient(135deg,#9050e0,#6030b0);border-color:#a066e0;color:#fff;box-shadow:0 0 18px rgba(122,64,200,0.55)}
.level-node.current:hover{transform:scale(1.06)}
.level-node.locked{background:#1a1030;border-color:rgba(160,100,255,0.2);color:rgba(200,170,255,0.3);cursor:default}
.level-info{flex:1}
.level-title{font-size:13px;font-weight:500;color:#e8d8ff}
.level-hint{font-size:12px;color:rgba(200,170,255,0.5)}
.level-badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
.badge-done{background:rgba(122,64,200,0.2);color:#9060d0}
.badge-current{background:rgba(122,64,200,0.3);color:#c8a0ff}
.badge-locked{background:rgba(255,255,255,0.05);color:rgba(200,170,255,0.3)}
.connector{width:2px;height:14px;background:rgba(160,100,255,0.2);margin:-4px 0 -4px 23px}
.connector.done{background:#7a40c8}
.lesson-header{background:linear-gradient(160deg,#1a0533 0%,#2d1060 100%);padding:1.25rem}
.lesson-title{color:#e8d8ff;font-size:15px;font-weight:500}
.lesson-level{color:rgba(200,170,255,0.6);font-size:12px}
.audio-player{background:rgba(255,255,255,0.06);border:1px solid rgba(160,100,255,0.25);border-radius:18px;padding:1.25rem;margin-top:1rem;box-shadow:0 0 30px rgba(120,60,200,0.12)}
.audio-topic-label{font-size:13px;color:rgba(200,170,255,0.8);margin-bottom:1rem}
.speakers{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.speaker-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.08);border-radius:20px;padding:6px 12px;transition:all .3s;border:1px solid transparent}
.speaker-chip.speaking{background:rgba(160,100,255,0.25);border-color:rgba(160,100,255,0.5)}
.speaker-dot{width:8px;height:8px;border-radius:50%}
.speaker-name{font-size:11px;color:rgba(200,170,255,0.8)}
.waveform{display:flex;align-items:center;gap:3px;height:40px;margin-bottom:1rem}
.wave-bar{width:4px;border-radius:3px;background:rgba(160,100,255,0.2);transition:height .1s,background .15s}
.wave-bar.active{background:linear-gradient(180deg,#c060ff,#7a40c8)}
.audio-controls{display:flex;align-items:center;gap:14px}
.play-btn{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#9050e0,#6030b0);border:2px solid rgba(180,120,255,0.5);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;box-shadow:0 0 18px rgba(122,64,200,0.55),0 2px 8px rgba(0,0,0,0.4)}
.play-btn:active{transform:scale(.92)}
.play-btn:disabled{opacity:.35;cursor:default;box-shadow:none}
.audio-time{font-size:12px;color:rgba(200,170,255,0.5);min-width:32px}
.audio-progress{flex:1;height:6px;background:rgba(255,255,255,0.1);border-radius:6px;overflow:hidden}
.audio-fill{height:100%;background:linear-gradient(90deg,#7a40c8,#c060ff);border-radius:6px;transition:width .25s}
.plays-left{font-size:12px;color:rgba(200,170,255,0.5);text-align:center;margin-top:8px}
.plays-left span{color:#c8a0ff;font-weight:600}
.now-speaking{font-size:12px;color:#c8a0ff;text-align:center;margin-top:6px;min-height:18px;font-style:italic}
.quiz-section{padding:1.25rem;flex:1;background:#0e0720}
.quiz-locked{text-align:center;padding:2.5rem 1rem}
.quiz-locked-icon{font-size:36px;color:rgba(200,170,255,0.3);margin-bottom:.75rem}
.quiz-locked-text{font-size:14px;color:rgba(200,170,255,0.5);line-height:1.6}
.quiz-q{font-size:15px;font-weight:500;color:#e8d8ff;margin-bottom:1rem;line-height:1.5}
.quiz-num{font-size:12px;color:rgba(200,170,255,0.4);margin-bottom:.5rem}
.option-btn{width:100%;text-align:left;background:#1a1030;border:1px solid rgba(160,100,255,0.22);border-radius:14px;padding:14px 16px;font-size:14px;color:#e8d8ff;cursor:pointer;margin-bottom:10px;transition:all .2s;display:flex;align-items:center;gap:12px;font-family:inherit}
.option-btn:hover:not(:disabled){background:#231545;border-color:rgba(160,100,255,0.45)}
.option-btn:active:not(:disabled){transform:scale(.98)}
.option-btn:disabled{cursor:default}
.option-btn.correct{background:rgba(29,158,117,0.18);border-color:#1d9e75;color:#5dcaa5}
.option-btn.wrong{background:rgba(226,75,74,0.14);border-color:#e24b4a;color:#f09595}
.option-letter{width:30px;height:30px;border-radius:9px;background:rgba(160,100,255,0.18);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:rgba(200,170,255,0.7);flex-shrink:0}
.next-btn{width:100%;padding:15px;background:linear-gradient(135deg,#9050e0,#6030b0);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:.75rem;transition:all .2s;letter-spacing:.2px;box-shadow:0 4px 16px rgba(122,64,200,0.35)}
.next-btn:active{transform:scale(.98);opacity:.9}
.next-btn:disabled{opacity:.35;cursor:default;box-shadow:none}
.tts-notice{background:rgba(239,159,39,0.1);border:.5px solid rgba(239,159,39,0.3);border-radius:10px;padding:10px 14px;font-size:12px;color:rgba(239,159,39,0.9);margin-bottom:1rem;line-height:1.5}
.result-header{background:linear-gradient(160deg,#1a0533 0%,#2d1060 100%);padding:1.25rem}
.result-body{text-align:center;padding:2.5rem 1.5rem;flex:1;background:#0e0720}
.result-emoji{font-size:52px;margin-bottom:1rem}
.result-title{font-size:22px;font-weight:600;color:#e8d8ff;margin-bottom:6px}
.result-sub{font-size:14px;color:rgba(200,170,255,0.6);margin-bottom:2rem;line-height:1.5}
.result-score{display:flex;justify-content:center;gap:2rem;margin-bottom:2rem}
.result-stat{text-align:center}
.result-num{font-size:28px;font-weight:600;color:#a066e0}
.result-label{font-size:12px;color:rgba(200,170,255,0.5)}
.result-actions{display:flex;flex-direction:column;gap:10px}
.btn-primary{padding:15px;background:linear-gradient(135deg,#9050e0,#6030b0);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(122,64,200,0.35);letter-spacing:.2px}
.btn-primary:active{transform:scale(.98);opacity:.9}
.btn-secondary{padding:14px;background:#1a1030;border:1px solid rgba(160,100,255,0.35);border-radius:14px;color:#c8a0ff;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-secondary:active{background:#2a1a50}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="home-header">
      <div class="app-brand">
        <div class="brand-icon">🇩🇪</div>
        <span class="brand-name">DeutschFlow</span>
      </div>
      <div class="home-title">Guten Morgen! 👋<br>Let's learn German.</div>
      <div class="home-sub">A1 level · Listen &amp; understand</div>
      <div class="progress-ring">
        <div class="ring-stat"><div class="ring-num" id="stat-done">0</div><div class="ring-label">Levels done</div></div>
        <div class="ring-divider"></div>
        <div class="ring-stat"><div class="ring-num">20</div><div class="ring-label">Subjects</div></div>
        <div class="ring-divider"></div>
        <div class="ring-stat"><div class="ring-num" id="stat-pct">0%</div><div class="ring-label">Progress</div></div>
      </div>
    </div>
    <div class="subjects-section">
      <div class="section-label">All Subjects</div>
      <div class="subject-grid" id="subject-list"></div>
    </div>
  </div>

  <!-- SUBJECT -->
  <div class="screen" id="screen-subject">
    <div class="subject-header">
      <div class="nav-bar">
        <button class="back-btn" onclick="showHome()"><i class="ti ti-arrow-left"></i> All subjects</button>
        <button class="home-nav-btn" onclick="showHome()" title="Home"><i class="ti ti-home"></i></button>
      </div>
      <div class="subj-hero">
        <div class="subj-big-icon" id="subj-big-icon"></div>
        <div><div class="subj-title" id="subj-title"></div><div class="subj-desc" id="subj-desc"></div></div>
      </div>
    </div>
    <div class="levels-container" id="levels-list"></div>
  </div>

  <!-- LESSON -->
  <div class="screen" id="screen-lesson">
    <div class="lesson-header">
      <div class="nav-bar">
        <button class="back-btn" onclick="stopAndGoBack()"><i class="ti ti-arrow-left"></i> Back</button>
        <div><div class="lesson-title" id="lesson-title"></div><div class="lesson-level" id="lesson-level"></div></div>
        <button class="home-nav-btn" onclick="showHome()" title="Home"><i class="ti ti-home"></i></button>
      </div>
      <div class="audio-player">
        <div class="audio-topic-label" id="audio-topic"></div>
        <div class="speakers" id="speakers-row"></div>
        <div class="waveform" id="waveform"></div>
        <div class="audio-controls">
          <button class="play-btn" id="play-btn" onclick="togglePlay()"><i class="ti ti-player-play" id="play-icon"></i></button>
          <div class="audio-progress"><div class="audio-fill" id="audio-fill" style="width:0%"></div></div>
          <div class="audio-time" id="audio-time">0:00</div>
        </div>
        <div class="plays-left">Plays remaining: <span id="plays-count">2</span> of 2</div>
        <div class="now-speaking" id="now-speaking"></div>
      </div>
    </div>
    <div class="quiz-section" id="quiz-section"></div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="result-header">
      <div class="nav-bar">
        <button class="back-btn" onclick="showSubject(currentSubjectIdx)"><i class="ti ti-arrow-left"></i> Subject</button>
        <button class="home-nav-btn" onclick="showHome()" title="Home"><i class="ti ti-home"></i></button>
      </div>
    </div>
    <div class="result-body">
      <div class="result-emoji" id="result-emoji">⭐</div>
      <div class="result-title" id="result-title">Level complete!</div>
      <div class="result-sub" id="result-sub"></div>
      <div class="result-score">
        <div class="result-stat"><div class="result-num" id="result-correct">3</div><div class="result-label">Correct</div></div>
        <div class="result-stat"><div class="result-num" id="result-total">3</div><div class="result-label">Questions</div></div>
        <div class="result-stat"><div class="result-num" id="result-pct">100%</div><div class="result-label">Score</div></div>
      </div>
      <div class="result-actions">
        <button class="btn-primary" id="next-level-btn" onclick="goNextLevel()">Continue to next level <i class="ti ti-arrow-right"></i></button>
        <button class="btn-secondary" onclick="replayLesson()"><i class="ti ti-refresh"></i> Replay this level</button>
        <button class="btn-secondary" onclick="showHome()"><i class="ti ti-home"></i> Back to home</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const SUBJECTS=[
  {icon:'👋',name:'Greetings & Introductions',desc:'Say hello, introduce yourself',color:'#7a40c8',bg:'rgba(122,64,200,0.2)',progress:0,unlocked:true},
  {icon:'👨‍👩‍👧',name:'Family & Friends',desc:'Talk about your family',color:'#1d9e75',bg:'rgba(29,158,117,0.2)',progress:0,unlocked:true},
  {icon:'☕',name:'At the Café',desc:'Order drinks and snacks',color:'#ef9f27',bg:'rgba(239,159,39,0.2)',progress:0,unlocked:true},
  {icon:'🏠',name:'Home & Living',desc:'Describe where you live',color:'#378add',bg:'rgba(55,138,221,0.2)',progress:0,unlocked:true},
  {icon:'🛒',name:'Shopping',desc:'Buy things at the store',color:'#d4537e',bg:'rgba(212,83,126,0.2)',progress:0,unlocked:true},
  {icon:'🚌',name:'Getting Around',desc:'Use public transport',color:'#639922',bg:'rgba(99,153,34,0.2)',progress:0,unlocked:false},
  {icon:'🍽️',name:'Food & Restaurants',desc:'Order meals, discuss food',color:'#ba7517',bg:'rgba(186,117,23,0.2)',progress:0,unlocked:false},
  {icon:'⏰',name:'Time & Dates',desc:'Tell time, plan meetings',color:'#7a40c8',bg:'rgba(122,64,200,0.2)',progress:0,unlocked:false},
  {icon:'🏥',name:'Health & Body',desc:'Describe how you feel',color:'#e24b4a',bg:'rgba(226,75,74,0.2)',progress:0,unlocked:false},
  {icon:'💼',name:'Work & Jobs',desc:'Discuss your profession',color:'#1d9e75',bg:'rgba(29,158,117,0.2)',progress:0,unlocked:false},
  {icon:'🎓',name:'School & Learning',desc:'Talk about studying',color:'#378add',bg:'rgba(55,138,221,0.2)',progress:0,unlocked:false},
  {icon:'🌤️',name:'Weather',desc:'Describe the weather',color:'#ef9f27',bg:'rgba(239,159,39,0.2)',progress:0,unlocked:false},
  {icon:'🎉',name:'Hobbies & Free Time',desc:'What do you do for fun',color:'#d4537e',bg:'rgba(212,83,126,0.2)',progress:0,unlocked:false},
  {icon:'📱',name:'Technology',desc:'Talk about devices & apps',color:'#7a40c8',bg:'rgba(122,64,200,0.2)',progress:0,unlocked:false},
  {icon:'🌍',name:'Travel & Holidays',desc:'Plan trips and vacations',color:'#639922',bg:'rgba(99,153,34,0.2)',progress:0,unlocked:false},
  {icon:'🏪',name:'In Town',desc:'Find places in the city',color:'#ba7517',bg:'rgba(186,117,23,0.2)',progress:0,unlocked:false},
  {icon:'🎭',name:'Feelings & Emotions',desc:'Express how you feel',color:'#e24b4a',bg:'rgba(226,75,74,0.2)',progress:0,unlocked:false},
  {icon:'🌿',name:'Nature & Animals',desc:'Plants, animals, outdoors',color:'#1d9e75',bg:'rgba(29,158,117,0.2)',progress:0,unlocked:false},
  {icon:'🎵',name:'Music & Arts',desc:'Talk about culture',color:'#378add',bg:'rgba(55,138,221,0.2)',progress:0,unlocked:false},
  {icon:'🍳',name:'Cooking at Home',desc:'Recipes and kitchen talk',color:'#ef9f27',bg:'rgba(239,159,39,0.2)',progress:0,unlocked:false},
];

const LEVEL_TOPICS=['Basic conversation','Simple phrases','Meeting people','Short dialogue','Expanded vocab','Asking questions','Answering questions','Two speakers','Natural pace','Daily scenarios','Complex replies','Slang & tone','Multiple topics','Mixed vocab','Longer exchanges','Rapid speech','Idiomatic phrases','Cultural context','Near-natural speed','Full A1 mastery'];

// Each line: { speaker index, german text, pause after in ms }
const CONVOS=[
  {
    topic:'Basic hello & goodbye',
    speakers:[{name:'Anna',dot:'#a066e0',pitch:1.2,rate:0.9},{name:'Tom',dot:'#4ab8e8',pitch:0.85,rate:0.9}],
    lines:[
      {s:0,text:'Hallo! Guten Morgen!',pause:600},
      {s:1,text:'Guten Morgen! Wie geht es dir?',pause:600},
      {s:0,text:'Gut, danke! Und dir?',pause:600},
      {s:1,text:'Mir geht es auch gut, danke.',pause:600},
      {s:0,text:'Schön. Auf Wiedersehen!',pause:600},
      {s:1,text:'Tschüss! Bis bald!',pause:400},
    ],
    qs:[
      {q:'What does Anna say first?',opts:['Guten Morgen','Guten Abend','Gute Nacht','Auf Wiedersehen'],ans:0},
      {q:'How does Tom respond to "Wie geht es dir?"',opts:['Er sagt Tschüss','Er antwortet "Gut, danke"','Er fragt nach dem Weg','Er bestellt Kaffee'],ans:1},
      {q:'How do they say goodbye?',opts:['Bis morgen','Auf Wiedersehen und Tschüss','Guten Tag','Danke schön'],ans:1},
    ]
  },
  {
    topic:'Introducing yourself',
    speakers:[{name:'Lisa',dot:'#ff80b0',pitch:1.25,rate:0.88},{name:'Max',dot:'#60c880',pitch:0.8,rate:0.9}],
    lines:[
      {s:0,text:'Hallo! Ich heiße Lisa. Wie heißt du?',pause:600},
      {s:1,text:'Hallo Lisa! Ich heiße Max. Woher kommst du?',pause:600},
      {s:0,text:'Ich komme aus Wien. Und du?',pause:600},
      {s:1,text:'Ich komme aus Berlin. Wie alt bist du?',pause:600},
      {s:0,text:'Ich bin zwanzig Jahre alt.',pause:600},

    qs:[

    ],

      {q:'How many siblings does Mia have?',opts:['Keine','Nur einen Bruder','Einen Bruder und eine Schwester','Zwei Schwestern'],ans:2},

  {

    ],
    qs:[
      {q:'Where does Julia live?',opts:['Auf dem Land','In einem Haus','In der Stadtmitte','Bei ihren Eltern'],ans:2},
      {q:'How many rooms does her apartment have?',opts:['Zwei','Drei','Vier','Fünf'],ans:1},
      {q:'How does she describe her apartment?',opts:['Klein und dunkel','Groß und hell','Alt und billig','Neu und teuer'],ans:1},

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentSubjectIdx=0,currentLevelIdx=0,playsLeft=2,isPlaying=false;
let currentQ=0,answers=[],quizUnlocked=false;
let waveInterval=null,progressInterval=null;
let ttsSupported=false,voices=[];
let currentLineIdx=0,totalDuration=0,elapsedTime=0,startTime=0;

// ── TTS SETUP ─────────────────────────────────────────────────────────────────
function initTTS(){
  if(!('speechSynthesis' in window)){ttsSupported=false;return;}
  ttsSupported=true;
  function loadVoices(){
    voices=window.speechSynthesis.getVoices();
  }
  loadVoices();
  window.speechSynthesis.onvoiceschanged=loadVoices;
}

function getVoice(preferFemale){
  // Try German voices first
  const deVoices=voices.filter(v=>v.lang.startsWith('de'));
  if(deVoices.length>0){
    if(preferFemale){
      const f=deVoices.find(v=>/female|frau|anna|helena|marlena|steffi/i.test(v.name));
      if(f)return f;
      return deVoices[0];
    } else {
      const m=deVoices.find(v=>/male|mann|hans|fritz|stefan|markus/i.test(v.name));
      if(m)return m;
      return deVoices[deVoices.length>1?1:0];
    }
  }
  // Fallback: any voice, alternate by index
  return voices[preferFemale?0:Math.min(1,voices.length-1)]||null;
}

// ── PLAYBACK ──────────────────────────────────────────────────────────────────
function getConvo(){return CONVOS[Math.min(currentLevelIdx,CONVOS.length-1)];}

function estimateDuration(convo){
  // Rough: 80ms per char + pause
  return convo.lines.reduce((a,l)=>a+(l.text.length*80)+l.pause,0);
}

function stopSpeech(){
  if(ttsSupported)window.speechSynthesis.cancel();
  clearInterval(waveInterval);clearInterval(progressInterval);
  resetWaveBars();
  isPlaying=false;updatePlayIcon();
  document.getElementById('now-speaking').textContent='';
}

function togglePlay(){
  if(isPlaying){stopSpeech();return;}
  if(playsLeft<=0)return;
  playsLeft--;
  document.getElementById('plays-count').textContent=playsLeft;
  document.getElementById('audio-fill').style.width='0%';
  document.getElementById('audio-time').textContent='0:00';
  elapsedTime=0;startTime=Date.now();
  isPlaying=true;updatePlayIcon();
  startWaveAnimation();
  startProgressBar();
  speakConversation();
}

function speakConversation(){
  const convo=getConvo();
  let lineIdx=0;
  function speakLine(){
    if(lineIdx>=convo.lines.length){
      // Done
      setTimeout(()=>{
        stopSpeech();
        document.getElementById('audio-fill').style.width='100%';
        highlightSpeaker(-1);
        if(playsLeft===0){quizUnlocked=true;renderQuiz();}
      },300);
      return;
    }
    const line=convo.lines[lineIdx];
    highlightSpeaker(line.s);
    document.getElementById('now-speaking').textContent=convo.speakers[line.s].name+' is speaking...';
    if(ttsSupported){
      const utt=new SpeechSynthesisUtterance(line.text);
      utt.lang='de-DE';
      const spk=convo.speakers[line.s];
      const v=getVoice(spk.pitch>1);
      if(v)utt.voice=v;
      utt.pitch=spk.pitch;
      utt.rate=spk.rate;
      utt.volume=1;
      utt.onend=()=>{
        if(!isPlaying)return;
        lineIdx++;
        setTimeout(speakLine,line.pause);
      };
      utt.onerror=()=>{lineIdx++;setTimeout(speakLine,line.pause);};
      window.speechSynthesis.speak(utt);
    } else {
      // No TTS: simulate timing
      const dur=line.text.length*80+line.pause;
      setTimeout(()=>{if(!isPlaying)return;lineIdx++;speakLine();},dur);
    }
  }
  speakLine();
}

function highlightSpeaker(idx){
  document.querySelectorAll('.speaker-chip').forEach((c,i)=>{
    c.classList.toggle('speaking',i===idx);
  });
}

function startWaveAnimation(){
  waveInterval=setInterval(()=>{
    if(!isPlaying){clearInterval(waveInterval);return;}
    document.querySelectorAll('.wave-bar').forEach(b=>{
      b.classList.toggle('active',Math.random()>.45);
      b.style.height=(8+Math.random()*24)+'px';
    });
  },130);
}

function startProgressBar(){
  const convo=getConvo();
  totalDuration=estimateDuration(convo);
  progressInterval=setInterval(()=>{
    if(!isPlaying){clearInterval(progressInterval);return;}
    elapsedTime=Date.now()-startTime;
    const pct=Math.min(99,Math.round((elapsedTime/totalDuration)*100));
    document.getElementById('audio-fill').style.width=pct+'%';
    const sec=Math.floor(elapsedTime/1000);
    document.getElementById('audio-time').textContent=Math.floor(sec/60)+':'+(('0'+(sec%60)).slice(-2));
  },200);
}

function resetWaveBars(){document.querySelectorAll('.wave-bar').forEach(b=>{b.classList.remove('active');});}
function updatePlayIcon(){
  document.getElementById('play-icon').className=isPlaying?'ti ti-player-pause':'ti ti-player-play';
  const btn=document.getElementById('play-btn');
  btn.disabled=(!isPlaying&&playsLeft<=0&&!quizUnlocked);
}

// ── SCREENS ───────────────────────────────────────────────────────────────────
function updateHomeStats(){
  const total=SUBJECTS.reduce((a,s)=>a+s.progress,0);
  const pct=Math.round((total/(SUBJECTS.length*20))*100);
  document.getElementById('stat-done').textContent=total;
  document.getElementById('stat-pct').textContent=pct+'%';
}

function buildSubjects(){
  updateHomeStats();
  const list=document.getElementById('subject-list');list.innerHTML='';
  SUBJECTS.forEach((s,i)=>{
    const pct=Math.round((s.progress/20)*100);
    const card=document.createElement('div');
    card.className='subject-card'+(s.unlocked?'':' locked');
    card.innerHTML=`<div class="subject-icon" style="background:${s.bg}">${s.icon}</div>
    <div class="subject-info">
      <div class="subject-name">${s.name}</div>
      <div class="subject-meta">${s.progress}/20 levels · ${pct}%</div>
      <div class="subject-progress-bar"><div class="subject-progress-fill" style="width:${pct}%;background:${s.color}"></div></div>
    </div>
    ${s.unlocked?'<i class="ti ti-chevron-right subject-chevron"></i>':'<i class="ti ti-lock subject-chevron"></i>'}`;
    if(s.unlocked)card.onclick=()=>showSubject(i);
    list.appendChild(card);
  });
}

function showHome(){stopSpeech();setScreen('home');buildSubjects();}

function showSubject(idx){
  stopSpeech();currentSubjectIdx=idx;
  const s=SUBJECTS[idx];
  document.getElementById('subj-big-icon').textContent=s.icon;
  document.getElementById('subj-big-icon').style.background=s.bg;
  document.getElementById('subj-title').textContent=s.name;
  document.getElementById('subj-desc').textContent=s.desc;
  const container=document.getElementById('levels-list');container.innerHTML='';
  for(let i=0;i<20;i++){
    const state=i<s.progress?'done':i===s.progress?'current':'locked';
    if(i>0){const conn=document.createElement('div');conn.className='connector'+(i<=s.progress?' done':'');container.appendChild(conn);}
    const row=document.createElement('div');row.className='level-row';
    row.innerHTML=`<div class="level-node ${state}" ${state!=='locked'?'onclick="startLesson('+i+')"':''}>${state==='done'?'<i class="ti ti-check"></i>':i+1}</div>
    <div class="level-info"><div class="level-title">Level ${i+1} · ${LEVEL_TOPICS[i]}</div>
    <div class="level-hint">${state==='done'?'Completed ✓':state==='current'?'Ready to play':'Complete previous level'}</div></div>
    <span class="level-badge badge-${state}">${state==='done'?'⭐':state==='current'?'Play':'🔒'}</span>`;
    container.appendChild(row);
  }
  setScreen('subject');
}

function startLesson(levelIdx){
  stopSpeech();
  currentLevelIdx=levelIdx;playsLeft=2;currentQ=0;answers=[];quizUnlocked=false;
  const s=SUBJECTS[currentSubjectIdx];
  const convo=getConvo();
  document.getElementById('lesson-title').textContent=s.name;
  document.getElementById('lesson-level').textContent='Level '+(levelIdx+1)+' of 20';
  document.getElementById('audio-topic').textContent='🎧 '+convo.topic;
  document.getElementById('plays-count').textContent=playsLeft;
  document.getElementById('now-speaking').textContent='';
  document.getElementById('audio-fill').style.width='0%';
  document.getElementById('audio-time').textContent='0:00';
  // Speakers row
  document.getElementById('speakers-row').innerHTML=convo.speakers.map(sp=>
    `<div class="speaker-chip"><div class="speaker-dot" style="background:${sp.dot}"></div><span class="speaker-name">${sp.name}</span></div>`
  ).join('');
  // Waveform
  const wf=document.getElementById('waveform');wf.innerHTML='';
  for(let i=0;i<38;i++){const b=document.createElement('div');b.className='wave-bar';b.style.height=(8+Math.random()*24)+'px';wf.appendChild(b);}
  updatePlayIcon();
  renderQuizLocked();
  setScreen('lesson');
}

function stopAndGoBack(){stopSpeech();showSubject(currentSubjectIdx);}

function renderQuizLocked(){
  const notice=ttsSupported?'':'<div class="tts-notice"><i class="ti ti-info-circle"></i> Your browser does not support speech synthesis. The audio is simulated — questions will unlock after 2 plays.</div>';
  document.getElementById('quiz-section').innerHTML=notice+`<div class="quiz-locked"><div class="quiz-locked-icon"><i class="ti ti-headphones"></i></div><div class="quiz-locked-text">Listen to the conversation <strong>twice</strong> to unlock the comprehension questions.</div></div>`;
}

function renderQuiz(){
  const convo=getConvo();const qs=document.getElementById('quiz-section');
  if(currentQ>=convo.qs.length){showResult();return;}
  const q=convo.qs[currentQ];
  qs.innerHTML=`<div class="quiz-num">Question ${currentQ+1} of ${convo.qs.length}</div>
  <div class="quiz-q">${q.q}</div>
  ${q.opts.map((o,i)=>`<button class="option-btn" id="opt-${i}" onclick="selectAnswer(${i})"><div class="option-letter">${'ABCD'[i]}</div>${o}</button>`).join('')}
  <button class="next-btn" id="next-q-btn" disabled onclick="nextQuestion()">Next <i class="ti ti-arrow-right"></i></button>`;
}

function selectAnswer(idx){
  const q=getConvo().qs[currentQ];
  for(let i=0;i<q.opts.length;i++){const b=document.getElementById('opt-'+i);if(b){b.disabled=true;if(i===q.ans)b.classList.add('correct');if(i===idx&&idx!==q.ans)b.classList.add('wrong');}}
  answers.push(idx===q.ans);
  const nb=document.getElementById('next-q-btn');
  if(nb){nb.disabled=false;nb.innerHTML=(currentQ+1>=getConvo().qs.length?'See results':'Next question')+' <i class="ti ti-arrow-right"></i>';}
}

function nextQuestion(){currentQ++;if(currentQ>=getConvo().qs.length)showResult();else renderQuiz();}

function showResult(){
  const correct=answers.filter(Boolean).length,total=answers.length,pct=Math.round((correct/total)*100);
  document.getElementById('result-correct').textContent=correct;
  document.getElementById('result-total').textContent=total;
  document.getElementById('result-pct').textContent=pct+'%';
  document.getElementById('result-emoji').textContent=pct===100?'🏆':pct>=67?'⭐':'💪';
  document.getElementById('result-title').textContent=pct===100?'Perfect score!':pct>=67?'Level complete!':'Keep practicing!';
  document.getElementById('result-sub').textContent=pct>=67?'You passed level '+(currentLevelIdx+1)+' of '+SUBJECTS[currentSubjectIdx].name:'Try listening again — you\'ll get it!';
  if(pct>=67&&SUBJECTS[currentSubjectIdx].progress===currentLevelIdx)SUBJECTS[currentSubjectIdx].progress=currentLevelIdx+1;
  const nb=document.getElementById('next-level-btn');
  if(currentLevelIdx+1>=20){nb.innerHTML='Subject complete! 🎉';nb.onclick=showHome;}
  setScreen('result');
}

function goNextLevel(){if(currentLevelIdx+1<20)startLesson(currentLevelIdx+1);else showHome();}
function replayLesson(){startLesson(currentLevelIdx);}
function setScreen(name){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+name).classList.add('active');}

// ── INIT ──────────────────────────────────────────────────────────────────────
initTTS();
buildSubjects();
</script>
